name: PR Automated Check (CI)

on:
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Code tu Github
        uses: actions/checkout@v3

      - name: Cai dat moi truong Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Tai thu vien JUnit 4, Mockito, va Servlet API
        run: |
          mkdir -p lib-test
          wget -q https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar -O lib-test/junit.jar
          wget -q https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar -O lib-test/hamcrest.jar
          wget -q https://repo1.maven.org/maven2/org/mockito/mockito-core/4.11.0/mockito-core-4.11.0.jar -O lib-test/mockito-core.jar
          wget -q https://repo1.maven.org/maven2/net/bytebuddy/byte-buddy/1.12.19/byte-buddy-1.12.19.jar -O lib-test/byte-buddy.jar
          wget -q https://repo1.maven.org/maven2/net/bytebuddy/byte-buddy-agent/1.12.19/byte-buddy-agent-1.12.19.jar -O lib-test/byte-buddy-agent.jar
          wget -q https://repo1.maven.org/maven2/org/objenesis/objenesis/3.3/objenesis-3.3.jar -O lib-test/objenesis.jar
          wget -q https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/4.0.1/javax.servlet-api-4.0.1.jar -O lib-test/servlet-api.jar

      - name: Bien dich (Compile) toan bo code
        run: |
          mkdir -p build/classes build/test-classes
          # Bien dich code chinh
          find src/java -name "*.java" > sources.txt
          if [ -s sources.txt ]; then 
            javac -cp "lib-test/servlet-api.jar" -d build/classes @sources.txt
          else
            echo "Khong co file nguon Java nao de bien dich."
          fi
          
          # Bien dich code test (neu co)
          find test -name "*.java" > tests.txt
          if [ -s tests.txt ]; then 
            javac -cp "build/classes:lib-test/*" -d build/test-classes @tests.txt
          else
            echo "Khong co file test nao de bien dich."
          fi

      - name: Chay Unit Test tu dong
        run: |
          if [ -s tests.txt ]; then
            # Tim tat ca cac lop Test va chay
            for test_file in $(find test -name "*Test.java"); do
              class_name=$(echo $test_file | sed 's|test/||' | sed 's|.java||' | tr '/' '.')
              echo "----------------------------------------"
              echo "Running test: $class_name"
              java -cp "build/classes:build/test-classes:lib-test/*" org.junit.runner.JUnitCore $class_name || exit 1
            done
          else
            echo "Khong co test nao de chay. Pass!"
          fi
