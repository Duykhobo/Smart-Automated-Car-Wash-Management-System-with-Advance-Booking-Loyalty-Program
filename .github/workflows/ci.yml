name: PR Automated Check (CI)

on:
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Code tu Github
        uses: actions/checkout@v3

      - name: Cai dat moi truong Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Tai thu vien JUnit 4 de test
        run: |
          mkdir -p lib-test
          wget -q https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar -O lib-test/junit.jar
          wget -q https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar -O lib-test/hamcrest.jar

      - name: Bien dich (Compile) toan bo code
        run: |
          mkdir -p build/classes build/test-classes
          find src/java -name "*.java" > sources.txt
          javac -d build/classes @sources.txt
          
          find test/java -name "*.java" > tests.txt
          javac -cp "build/classes:lib-test/junit.jar:lib-test/hamcrest.jar" -d build/test-classes @tests.txt

      - name: Chay Unit Test tu dong
        run: |
          java -cp "build/classes:build/test-classes:lib-test/junit.jar:lib-test/hamcrest.jar" org.junit.runner.JUnitCore com.autowashpro.utils.LoyaltyEngineTest
