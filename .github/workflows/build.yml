name: Build Verification (Chống Sập)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ kho GitHub về máy chủ ảo
    - name: Checkout code
      uses: actions/checkout@v3

    # Bước 2: Cài đặt Java JDK
    # Lưu ý: Tôi đang cấu hình mặc định là Java 8. 
    # Nếu team bạn dùng Java cao hơn (11, 17, 21), hãy báo tôi đổi nhé!
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    # Bước 3: Chạy lệnh biên dịch (Compile) bằng Ant của NetBeans
    # Nếu code bị lỗi cú pháp, bước này sẽ văng lỗi (chữ X đỏ)
    - name: Compile Code (Check lỗi cú pháp)
      run: ant compile
